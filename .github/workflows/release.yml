name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for OIDC + npm provenance

env:
  DEBUG: napi:*
  APP_NAME: config-disassembler
  CARGO_INCREMENTAL: "1"
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  test:
    uses: ./.github/workflows/build.yml
    secrets: inherit

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node

  build-natives:
    name: Build native (${{ matrix.settings.target }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin
          # Linux glibc (cross-compiled via the napi-rs cross sysroot, so a
          # single ubuntu-latest runner can build x64 + arm64 reproducibly).
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu --use-napi-cross
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --use-napi-cross
          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npm run build -- --target aarch64-pc-windows-msvc
          - host: windows-latest
            target: i686-pc-windows-msvc
            build: npm run build -- --target i686-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.APP_NAME }}.*.node
          if-no-files-found: error

      # The napi-generated index.js / index.d.ts loader is identical
      # across every target (it's a switch-statement loader covering all
      # configured platforms), so we only need to upload it once. Pick a
      # fast/reliable host to do it from.
      - name: Upload JS bindings (loader + types)
        if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: js-bindings
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish
    needs: [release-please, build-natives]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm ci

      - name: Create per-platform npm dirs
        run: npx napi create-npm-dirs

      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move native artifacts into platform packages
        run: npx napi artifacts

      - name: Restore JS bindings to repo root for main package publish
        run: |
          cp artifacts/js-bindings/index.js ./index.js
          cp artifacts/js-bindings/index.d.ts ./index.d.ts
          ls -la index.js index.d.ts
        shell: bash

      - name: List per-platform packages
        run: ls -R ./npm
        shell: bash

      - name: Configure npm provenance
        run: npm config set provenance true

      - name: Publish per-platform packages and update optionalDependencies
        # The seven per-platform package names are net-new and have no
        # npm trusted-publisher configured yet (npm requires the package
        # to exist before trusted publishing can be set up). Bootstrap
        # via NPM_TOKEN; once each platform package exists and trusted
        # publishing is configured for it on npmjs.com, this can revert
        # to `NODE_AUTH_TOKEN=""` to match the main publish below.
        run: npx napi prepublish -t npm --no-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        # `config-disassembler` already has npm trusted publishing set
        # up, so OIDC alone authenticates and NODE_AUTH_TOKEN is
        # cleared to avoid setup-node's default GITHUB_TOKEN leaking
        # in and breaking the provenance flow.
        run: NODE_AUTH_TOKEN="" npm publish --access public --tag latest --provenance

  smoke-test:
    needs: publish
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/smoke-test.yml
    secrets: inherit
